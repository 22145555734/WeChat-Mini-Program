<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        /* 给body设置基础宽度和背景色 */
        body{
            width:500px;
            background: #ccc;
        }
        /* 盒子模型核心样式 */
        .my-clz{
            background: gold;     /* 背景色，覆盖在padding和content区域 */
            padding:10px;         /* 内边距：上下左右各10px */
            margin:10px;          /* 外边距：上下左右各10px */
            border: 10px solid red;/* 边框：10px 红色实线 */

            display:flex; /* 使用flex布局，默认主轴为水平方向 */
            align-items: center;
            justify-content: center;
            border-radius: 50px;
        }

        .my-clz2{
            background: gold;     /* 背景色，覆盖在padding和content区域 */
            padding:10px;         /* 内边距：上下左右各10px */
            margin:10px;          /* 外边距：上下左右各10px */
            border: 100px solid red;/* 边框：10px 红色实线 */

            display:flex; /* 使用flex布局，默认主轴为水平方向 */
            align-items: center;
            justify-content: center;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <div>盒子模型示例</div>
    <div style="background: red">上边界</div>
    <!-- 应用了盒子模型样式的核心盒子 -->
    <div class="my-clz">我是一个盒子，我设置了内边距、外边距和边框</div>
    <div style="background: red">下边界</div>

    <div class="my-clz2">按钮</div>
</body>
</html>

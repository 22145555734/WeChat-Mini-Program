<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100%;
        }


        /* 关闭按钮 */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }

        .content{
            width: 100%;
            height: 100%;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center; 
        }
        .user-info{
            height: 70%;
            width: 80%;
            background-color: #fff;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        


        .user-info-title{
            height: 10%;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 20px;
            font-weight: bold;
        }
        .user-info-content{
            height: 90%;
            display: flex;
        }
        /* 左侧导航 */
        .user-info-content-setting{
            width: 180px;
            border-right: 1px solid #000;
            height: 100%;
            padding-top: 20px;
        }
        .user-info-content-setting-item{
            height: 40px;
            display: flex;
            align-items: center;
            padding-left: 25px;
            color: #888;
            font-size: 15px;
            white-space: nowrap;
            cursor: pointer;
        }



        /* 右侧基本信息 */
        .user-info-content-main{
            flex: 1;
            padding: 20px 40px;
        }
        .user-info-content-main-title{
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        /* 信息项布局 */
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }
        .info-label {
            width: 80px;
            font-size: 18px;
        }
        .info-action {
            margin-left: 40px;
            font-size: 18px;
            color: #6f42c1;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="user-info">
            <!-- 关闭按钮 -->
            <div class="close-btn">×</div>
            <div class="user-info-title">个人设置</div>

            <div class="user-info-content">
                <!-- 左侧菜单 -->
                <div class="user-info-content-setting">
                    <div class="user-info-content-setting-item">基本信息</div>
                    <div class="user-info-content-setting-item">修改密码</div>
                    <div class="user-info-content-setting-item">账户钱包</div>
                    <div class="user-info-content-setting-item">帐号关联管理</div>
                    <div class="user-info-content-setting-item">开发者配置</div>
                    <div class="user-info-content-setting-item">个性化</div>
                </div>

                <!-- 右侧基本信息内容 -->
                <div class="user-info-content-main">
                    <div class="user-info-content-main-title">基本信息</div>

                    <div class="info-item">
                        <div class="info-label">头像：</div>
                        <div class="info-action">修改头像</div>
                    </div>

                    <div class="info-item">
                        <div class="info-label">昵称：</div>
                        <div class="info-action">修改昵称</div>
                    </div>

                    <div class="info-item">
                        <div class="info-label">手机号：</div>
                        <div class="info-action">修改手机号</div>
                    </div>

                    <div class="info-item">
                        <div class="info-label">邮箱：</div>
                        <div class="info-action">修改邮箱</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

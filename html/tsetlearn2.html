<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>个人中心</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background-color: #f2f5f8;
      padding: 30px;
    }

    /* 顶部卡片 */
    .profile-card {
        background: white;           /* 背景：白色 */
        border-radius: 16px;         /* 圆角：16像素 */
        padding: 24px;               /* 内边距：24px（里面内容不贴边） */
        display: flex;               /* 让里面的头像和文字 横着排 */
        align-items: center;         /* 垂直居中对齐 */
        gap: 20px;                   /* 头像和文字之间空 20px 距离 */
        margin-bottom: 24px;         /* 卡片下面空出 24px，不贴着下面内容 */
        box-shadow: 0 7px 10px rgba(0,0,0,0.05);  /* 淡淡的阴影，让卡片浮起来 */
        
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;   /* 圆角拉满 → 直接变成圆形 */
      background-color: #722ed1;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      
    }

    .profile-info h2 {
      font-size: 22px;
      margin-bottom: 6px;
    }


    /* 内容布局 */
    .container {
      display: flex;
      gap: 24px;
    }

    /* 左侧菜单 */
    .menu {
      width: 220px;
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 7px 10px rgba(0,0,0,0.09);  /* 淡淡的阴影，让卡片浮起来 */
    }
    .menu-item {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .menu-item.active {
      background-color: #722ed1;
      color: white;
    }

    .menu-item:hover:not(.active) {
      background-color: #f5f5f5;
    }

    /* 右侧内容 */
    .main {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 7px 10px rgba(0,0,0,0.09);  /* 淡淡的阴影，让卡片浮起来 */
    }

    .main h3 {
      font-size: 20px;
      margin-bottom: 24px;
      color: #333;
    }

    /* 表单行 */
    .form-row {
      margin-bottom: 20px;
    }

    .form-row label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-size: 14px;
    }

    .form-row input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }

    .form-row input:focus {
      border-color: #722ed1;
    }

    /* 按钮 */
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-primary {
      background-color: #722ed1;
      color: white;
    }

    .btn-primary:hover {
      background-color: #5c1cb8;
    }
  </style>
</head>

<body>
  <!-- 顶部个人卡片 -->
  <div class="profile-card">
    <div class="avatar">用</div>
    <div class="profile-info">
      <h2>张三</h2>
    </div>
  </div>

  <!-- 主体布局 -->
  <div class="container">
    <!-- 左侧菜单 -->
    <div class="menu">
      <div class="menu-item active">个人资料</div>
      <div class="menu-item">安全设置</div>
      <div class="menu-item">账号绑定</div>
      <div class="menu-item">消息通知</div>
      <div class="menu-item">隐私设置</div>
    </div>

    <!-- 右侧内容 -->
    <div class="main">
      <h3>个人资料</h3>

      <div class="form-row">
        <label>用户昵称</label>
        <input type="text" value="张三" />
      </div>

      <div class="form-row">
        <label>手机号码</label>
        <input type="text" value="13800138000" />
      </div>

      <div class="form-row">
        <label>电子邮箱</label>
        <input type="text" value="zhangsan@example.com" />
      </div>

      <div class="form-row">
        <label>个性签名</label>
        <input type="text" value="努力生活，认真工作" />
      </div>

      <button class="btn btn-primary">保存修改</button>
    </div>
  </div>
</body>
</html>
